name: verify
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup language toolchain
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint / format
        run: |
          ruff check src tests
      - name: Unit tests
        run: |
          pytest --cov=local_agent_harness --cov-report=term-missing --cov-fail-under=95
      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Manifest regression
        run: |
          if command -v local-agent-harness >/dev/null 2>&1; then
            local-agent-harness validate --repo .
          fi
