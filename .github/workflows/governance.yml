name: governance
on:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify manifests present
        run: |
          test -f AGENTS.md
          test -f GROUNDING.md
      - name: Forbid scope-relaxing edits to GROUNDING.md
        run: |
          if git --no-pager diff origin/main...HEAD -- GROUNDING.md | grep -E '^-.*HC[0-9]+'; then
            echo "Hard constraint removed from GROUNDING.md — blocked." >&2
            exit 1
          fi
      - name: AI-readiness must not regress
        run: |
          if [ -f scripts/readiness_report.py ]; then
            python scripts/readiness_report.py --check-no-regression
          fi
