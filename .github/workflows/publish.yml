name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # trusted publisher (PyPI OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build distribution
        run: uv build
      - name: Publish to PyPI
        # Configure trusted publisher at https://pypi.org/manage/account/publishing/
        # before this job can succeed.
        run: uv publish
